apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-warmup
spec:
  replicas: 2
  selector:
    matchLabels:
      app: claude-warmup
  template:
    metadata:
      labels:
        app: claude-warmup
    spec:
      serviceAccountName: claude-warmup
      containers:
        - name: claude-warmup
          image: ghcr.io/pprecel/claude-warmup:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: redis-password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
