apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-warmup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-warmup
  template:
    metadata:
      labels:
        app: claude-warmup
    spec:
      containers:
        - name: claude-warmup
          image: ghcr.io/pprecel/claude-warmup:latest
          ports:
            - containerPort: 3000
