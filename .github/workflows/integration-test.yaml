name: Integration Test

on:
  push:
    branches:
      - main

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Create k3d cluster
        run: k3d cluster create test --wait

      - name: Build image and import into cluster
        run: |
          docker build -t ghcr.io/pprecel/claude-warmup:${{ github.sha }} .
          k3d image import ghcr.io/pprecel/claude-warmup:${{ github.sha }} -c test

      - name: Create secret
        run: |
          kubectl create secret generic redis-credentials \
            --from-literal=redis-password=changeme

      - name: Deploy application
        run: |
          kubectl apply -f k8s/
          kubectl set image deployment/claude-warmup \
            claude-warmup=ghcr.io/pprecel/claude-warmup:${{ github.sha }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/redis --timeout=60s
          kubectl rollout status deployment/claude-warmup --timeout=60s

      - name: Run integration test
        run: |
          kubectl port-forward svc/claude-warmup 8080:80 &
          sleep 3
          RESPONSE=$(curl -sf http://localhost:8080)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q "hello claude warmup (requests: 1)"
          RESPONSE=$(curl -sf http://localhost:8080)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q "hello claude warmup (requests: 2)"

      - name: Verify Redis requires authentication
        run: |
          kubectl exec deployment/redis -- redis-cli ping 2>&1 | grep -q "NOAUTH"
          kubectl exec deployment/redis -- redis-cli -a changeme ping 2>&1 | grep -q "PONG"
